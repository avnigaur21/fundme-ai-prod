<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FundMe | Saved Opportunities</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background-color: var(--color-bg-body) !important; transition: background-color 0.3s ease, color 0.3s ease;
        }

        .main-content {
            background: var(--color-bg-body) !important; transition: background 0.3s ease;
        }

        .watchlist-tabs {
            display: flex;
            gap: 2rem;
            border-bottom: 1px solid var(--color-border);
            margin-bottom: 2rem;
        }

        .tab-btn {
            padding: 1rem 0;
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            font-weight: 500;
            color: var(--color-text-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.9375rem;
        }

        .tab-btn:hover {
            color: var(--color-primary);
        }

        .tab-btn.active {
            color: var(--color-primary);
            border-bottom-color: var(--color-primary);
        }

        .watchlist-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 1.5rem;
            align-items: start;
        }

        /* Lock eligibility to exactly 1 bullet line — same as explorer */
        .watchlist-grid .opp-eligibility-list {
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
        }

        /* Lock description to 2 lines — same as explorer */
        .watchlist-grid .opp-description {
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        /* Lock title to 2 lines so long titles don't break layout */
        .watchlist-grid .opp-title {
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .watchlist-card {
            background: var(--color-bg-surface);
            border: none;
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .watchlist-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        .card-type {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--color-text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .status-badge {
            padding: 4px 10px;
            border-radius: 99px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .status-active {
            background: #F0FDF4;
            color: #166534;
        }

        .status-soon {
            background: #FFFBEB;
            color: #92400E;
        }

        .status-closed {
            background: var(--color-bg-body);
            color: #4B5563;
        }

        .card-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
            padding-top: 1rem;
            border-top: 1px solid var(--color-border);
        }

        .action-link {
            font-size: 0.875rem;
            color: var(--color-primary);
            text-decoration: none;
            font-weight: 500;
        }

        .remove-btn {
            font-size: 0.8125rem;
            color: #EF4444;
            background: none;
            border: none;
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.2s ease;
        }

        .remove-btn:hover {
            opacity: 1;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

        <!-- Sidebar -->

            <div class="sidebar-header">
                <span class="sidebar-logo">FundMe.</span>
                <button class="sidebar-toggle" id="sidebar-toggle" title="Expand sidebar" aria-label="Expand sidebar">
                    <svg viewBox="0 0 24 24">
                        <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z" />
                    </svg>
                </button>
            </div>
                        <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item" data-tooltip="Dashboard">

                    </svg>

                </a>
                <a href="business-opportunities.html" class="nav-item" data-tooltip="Business Opportunities">

                        <path
                            d="M20.5 6c-2.61.7-5.67 1-8.5 1s-5.89-.3-8.5-1L3 8c1.86.5 4 .83 6 1v13h2v-6h2v6h2V9c2-.17 4.14-.5 6-1l-.5-2zM12 6c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z" />
                    </svg>
                    <span class="nav-item-label">Business Opportunities</span>
                </a>
                <a href="profile.html" class="nav-item" data-tooltip="Startup Profile">
                    <svg class="nav-icon" viewBox="0 0 24 24">
                        <path
                            d="M20 6h-4V4c0-1.11-.89-2-2-2h-4c-1.11 0-2 .89-2 2v2H4c-1.11 0-1.99.89-1.99 2L2 19c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2zm-6 0h-4V4h4v2z" />
                    </svg>
                    <span class="nav-item-label">Startup Profile</span>

                    </svg>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Topbar -->
            <header class="topbar">
                <div style="display: flex; align-items: center;">
                    <button class="btn btn-outline" id="menu-toggle"
                        style="margin-right: 1rem; padding: 4px 8px; display: none;">☰</button>
                    <h1 class="topbar-title">Saved Opportunities</h1>
                </div>
                                <a href="profile.html"
                    style="display: flex; align-items: center; gap: 1rem; text-decoration: none; color: inherit; cursor: pointer;">
                    <!-- User Profile -->
                    <div style="font-size: 0.875rem; text-align: right;">
                        <div style="font-weight: 600;" id="header_user_name">...</div>
                        <div style="font-size: 0.75rem; color: var(--color-text-secondary);" id="header_user_meta">...
                        </div>
                    </div>
                    <img src="https://ui-avatars.com/api/?name=User&background=0ea5e9&color=fff&size=32"
                        alt="User Profile" style="width: 32px; height: 32px; border-radius: 50%; object-fit: cover;" id="header_user_avatar">
                </a>
            </header>            <div class="container" style="padding-top: var(--spacing-lg); max-width: none; width: 100%; margin: 0;">
                <div class="watchlist-grid" id="saved-opps-grid">
                    <!-- Dynamic content loads here -->
                    <div style="grid-column: 1/-1; text-align: center; padding: 4rem;">
                        <div class="loader" style="margin: 0 auto;"></div>
                        <p style="margin-top: 1rem; color: var(--color-text-secondary);">Loading your watchlist...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="js/api.js"></script>
    <script src="js/header.js"></script>
    <script src="js/app.js"></script>
    <script>
        async function loadSavedOpportunities() {
            const grid = document.getElementById('saved-opps-grid');
            if (!grid) return;

            try {
                const [savedItems, allOpps] = await Promise.all([
                    api.getSaved(),
                    api.getOpportunities()
                ]);

                const oppMap = new Map();
                allOpps.forEach(o => { oppMap.set(o.opportunity_id, o); });

                const currentUserId = getCurrentUserId();
                const userSaved = savedItems.filter(s => s.user_id === currentUserId);

                if (userSaved.length === 0) {
                    grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 4rem; color: var(--color-text-secondary);">No saved opportunities found. <a href="explorer.html" style="color: var(--color-primary);">Explore some!</a></div>';
                    return;
                }

                grid.innerHTML = '';
                const displayOpps = [];

                userSaved.forEach(saved => {
                    const opp = oppMap.get(saved.opportunity_id);
                    if (!opp) return;
                    displayOpps.push(opp);

                    const card = document.createElement('div');
                    card.className = 'opp-card';
                    card.setAttribute('data-opportunity', opp.opportunity_id);
                    
                    const sector = opp.sector || 'Any Sector';
                    const stage = opp.stage || 'Any Stage';
                    const amount = opp.amount || 'Variable';
                    const deadline = typeof formatDeadline === 'function' ? formatDeadline(opp.deadline) : opp.deadline;
                    
                    // Prefer the summarized eligibility string for the card view — same logic as explorer
                    let elig = opp.eligibility || 'See details for eligibility criteria.';
                    if (Array.isArray(elig) && elig.length > 0) elig = elig[0];
                    if (opp.formatted_details && opp.formatted_details.eligibility && Array.isArray(opp.formatted_details.eligibility) && opp.formatted_details.eligibility.length > 0) {
                        elig = opp.formatted_details.eligibility[0];
                    }
                    if (typeof elig === 'string' && elig.length > 90) elig = elig.substring(0, 87) + '...';

                    let desc = opp.description || opp.summary || 'Click view details for more information.';
                    if (typeof desc === 'string' && desc.length > 120) desc = desc.substring(0, 117) + '...';

                    card.innerHTML = `
                        <div class="opp-header">
                            <div style="min-width: 0; flex: 1;">
                                <h3 class="opp-title">${opp.title || 'Untitled'}</h3>
                                <div style="font-size: 0.75rem; color: var(--color-text-secondary);">
                                    ${opp.provider || 'Provider'}${opp.credibility_source ? ` <span style="display: inline-flex; align-items: center; vertical-align: middle; color: #047857; background: #ecfdf5; padding: 2px 6px; border-radius: 99px; font-weight: 600; font-size: 0.65rem;" title="${opp.credibility_source}">✓ Verified</span>` : ''}
                                </div>
                            </div>
                            <span class="badge badge-match" data-score-for="${opp.opportunity_id}" style="background: rgba(16, 185, 129, 0.05); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.2); padding: 4px 12px; border-radius: 99px; font-weight: 700; font-size: 0.75rem; flex-shrink: 0; white-space: nowrap; align-self: flex-start;">✨ Scoring...</span>
                        </div>
                        
                        <div class="opp-badges" style="margin-top: 0.25rem; margin-bottom: 0.25rem;">
                            <span class="badge badge-blue">${sector}</span>
                            <span class="badge badge-green">${stage}</span>
                            <span class="badge badge-yellow">${amount}</span>
                        </div>

                        <div style="margin-bottom: 0.5rem; font-size: 0.875rem;">
                            Deadline: <span class="deadline-text">${deadline}</span>
                        </div>

                        <div class="opp-eligibility">
                            <div class="opp-eligibility-title">Eligibility</div>
                            <ul class="opp-eligibility-list">
                                ${Array.isArray(elig) 
                                    ? elig.map(e => `<li>${e}</li>`).join('') 
                                    : `<li>${elig}</li>`
                                }
                            </ul>
                        </div>

                        <div class="opp-description">
                            ${desc}
                        </div>

                        <div class="opp-actions" style="margin-top: 1rem; display: flex; gap: 0.5rem;">
                            <button class="btn btn-primary saved" style="flex: 1; padding: 6px 0; font-size: 0.8rem; justify-content: center;" data-save-btn data-saved="true" data-opportunity-id="${opp.opportunity_id}">Saved</button>
                            <button class="btn btn-primary" style="flex: 1.5; padding: 6px 0; font-size: 0.8rem; justify-content: center;" onclick="window.location.href='draft-generator.html?opportunity_id=${opp.opportunity_id}'">Prepare Draft</button>
                            <button class="btn btn-outline" style="flex: 1.5; padding: 6px 0; font-size: 0.8rem; justify-content: center;" onclick="window.location.href='opportunity.html?opportunity_id=${opp.opportunity_id}'">View Details</button>
                        </div>
                    `;
                    
                    const removeBtn = card.querySelector('[data-save-btn]');
                    removeBtn.onclick = async (e) => {
                        e.preventDefault();
                        if (typeof toggleSave === 'function') {
                            await toggleSave(opp.opportunity_id, removeBtn);
                            // On the saved page, we typically want to remove the card immediately
                            card.style.opacity = '0.5';
                            card.style.pointerEvents = 'none';
                            setTimeout(() => card.remove(), 300);
                        }
                    };

                    grid.appendChild(card);
                });

                // --- 2. Start Batch Scoring ---
                api.getBatchMatchScores(displayOpps).then(scores => {
                    scores.forEach(s => {
                        const badge = document.querySelector(`[data-score-for="${s.opportunity_id}"]`);
                        if (badge && s.score !== null) {
                            badge.innerText = `${s.score}% Match`;
                            if (s.score >= 85) {
                                badge.style.background = 'rgba(16, 185, 129, 0.15)';
                                badge.style.borderColor = 'rgba(16, 185, 129, 0.4)';
                            }
                        } else if (badge) {
                            badge.innerText = '--';
                        }
                    });
                });

                if (typeof initAIFeatures === 'function') initAIFeatures();
                else if (typeof explorerInitAIFeatures === 'function') explorerInitAIFeatures();
                
                // Fallback for Check Eligibility logic if direct function not moved
                injectSavedAIFeatures();

            } catch (err) {
                console.error('Load Saved Error:', err);
                grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 4rem; color: #EF4444;">Failed to load saved opportunities.</div>';
            }
        }

        // Helper to inject AI buttons into Saved cards (replica of explorer logic)
        function injectSavedAIFeatures() {
            const cards = document.querySelectorAll('.opp-card');
            cards.forEach(card => {
                if (card.querySelector('.ai-injected')) return;
                const oppActions = card.querySelector('.opp-actions');
                const aiButtonsDiv = document.createElement('div');
                aiButtonsDiv.className = 'ai-injected';
                aiButtonsDiv.style.display = 'flex';
                aiButtonsDiv.style.gap = '0.5rem';
                aiButtonsDiv.style.marginTop = '0.75rem';
                
                const eligibilityBtn = document.createElement('button');
                eligibilityBtn.className = 'btn btn-outline';
                eligibilityBtn.style.flex = '1';
                eligibilityBtn.style.fontSize = '0.8rem';
                eligibilityBtn.style.padding = '8px 0';
                eligibilityBtn.style.justifyContent = 'center';
                eligibilityBtn.style.background = 'linear-gradient(135deg, rgba(168, 85, 247, 0.1), rgba(236, 72, 153, 0.1))';
                eligibilityBtn.style.border = '1px solid #d8b4fe';
                eligibilityBtn.style.borderRadius = '8px';
                eligibilityBtn.innerHTML = 'Check Eligibility';

                aiButtonsDiv.appendChild(eligibilityBtn);
                card.insertBefore(aiButtonsDiv, oppActions);

                eligibilityBtn.onclick = async () => {
                    const oppId = card.getAttribute('data-opportunity');
                    const eligEl = card.querySelector('.opp-eligibility');
                    eligEl.innerHTML = '<div class="opp-eligibility-title">Eligibility</div><em style="color:#8b5cf6;">Checking...</em>';
                    eligibilityBtn.disabled = true;

                    try {
                        const profile = await api.getProfile();
                        const opp = { opportunity_id: oppId, title: card.querySelector('.opp-title').innerText };
                        const res = await apiFetch('/ai/check-eligibility', { method: 'POST', body: { profile, opportunity: opp } });
                        
                        eligEl.innerHTML = `<div class="opp-eligibility-title">AI Eligibility Check</div><div style="font-size:0.85rem; color:var(--color-text-main);">${res.result}</div>`;
                    } catch (err) {
                        eligEl.innerHTML = '<div class="opp-eligibility-title">Eligibility</div><em style="color:#ef4444;">Check failed.</em>';
                    } finally {
                        eligibilityBtn.disabled = false;
                    }
                };
            });
        }

        // Shared utility from explorer (redefined here for safety)
        function formatDeadline(d) {
            if (!d || d === 'Rolling') return 'Rolling';
            const date = new Date(d);
            if (isNaN(date)) return d;
            return date.toLocaleDateString('en-GB', { day: 'june' !== 'june' ? 'numeric' : 'numeric', month: 'short' });
        }

        document.addEventListener('DOMContentLoaded', loadSavedOpportunities);
    </script>
</body>
