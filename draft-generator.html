<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FundMe | Draft Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background-color: var(--color-bg-body) !important;
        }

        .main-content {
            background: var(--color-bg-body) !important;
        }

        .draft-container {
            max-width: 860px;
            margin: 0 auto;
            background: var(--color-bg-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            padding: var(--spacing-xl);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.08), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        .draft-header {
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--color-border);
        }

        .draft-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--color-primary-dark);
            margin-bottom: 0.5rem;
        }

        .draft-subtitle {
            font-size: 0.95rem;
            color: var(--color-text-secondary);
        }

        .draft-banner {
            margin-bottom: 1.25rem;
            padding: 1rem 1.1rem;
            border-radius: 12px;
            border: 1px solid #dbeafe;
            background: #f8fbff;
        }

        .draft-banner-title {
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: #1d4ed8;
        }

        .draft-banner-grid {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            flex-wrap: wrap;
            margin-top: 0.45rem;
        }

        .draft-banner-copy {
            max-width: 520px;
            color: var(--color-text-main);
            line-height: 1.5;
        }

        .draft-banner-meta {
            font-size: 0.85rem;
            color: var(--color-text-secondary);
            min-width: 220px;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-label {
            display: block;
            font-size: 0.9375rem;
            font-weight: 600;
            color: var(--color-text-primary);
            margin-bottom: 0.5rem;
        }

        .form-textarea,
        .form-input,
        .form-select {
            width: 100%;
            padding: 1rem;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            font-family: inherit;
            font-size: 0.9375rem;
            background: var(--color-bg-surface);
            color: var(--color-text-main);
            box-sizing: border-box;
            line-height: 1.5;
        }

        .form-textarea {
            min-height: 110px;
            resize: vertical;
        }

        .field-helper {
            margin-top: 0.45rem;
            font-size: 0.8rem;
            color: var(--color-text-secondary);
        }

        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 0.65rem;
            padding: 0.85rem 1rem;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            background: var(--color-bg-body);
        }

        .draft-actions {
            display: flex;
            gap: 0.85rem;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--color-border);
            justify-content: flex-end;
            flex-wrap: wrap;
        }

        .draft-actions .btn {
            padding: 10px 20px;
            font-size: 0.9375rem;
        }
    </style>
</head>

<body>
    <div class="dashboard-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <span class="sidebar-logo">FundMe.</span>
                <button class="sidebar-toggle" id="sidebar-toggle">
                    <svg viewBox="0 0 24 24">
                        <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z" />
                    </svg>
                </button>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item" data-tooltip="Dashboard">
                    <svg class="nav-icon" viewBox="0 0 24 24">
                        <path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z" />
                    </svg>
                    <span class="nav-item-label">Dashboard</span>
                </a>
                <a href="explorer.html" class="nav-item" data-tooltip="Explorer">
                    <svg class="nav-icon" viewBox="0 0 24 24">
                        <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" />
                    </svg>
                    <span class="nav-item-label">Explorer</span>
                </a>
                <a href="saved.html" class="nav-item" data-tooltip="Saved">
                    <svg class="nav-icon" viewBox="0 0 24 24">
                        <path d="M17 3H7c-1.1 0-1.99.9-1.99 2L5 21l7-3 7 3V5c0-1.1-.9-2-2-2z" />
                    </svg>
                    <span class="nav-item-label">Saved</span>
                </a>
                <a href="drafts.html" class="nav-item active" data-tooltip="Drafts">
                    <svg class="nav-icon" viewBox="0 0 24 24">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm0 0v6h6" />
                    </svg>
                    <span class="nav-item-label">Drafts</span>
                </a>
                <a href="applications.html" class="nav-item" data-tooltip="Applications">
                    <svg class="nav-icon" viewBox="0 0 24 24">
                        <path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z" />
                    </svg>
                    <span class="nav-item-label">Applications</span>
                </a>
                <a href="business-opportunities.html" class="nav-item" data-tooltip="Business Opportunities">
                    <svg class="nav-icon" viewBox="0 0 24 24">
                        <path d="M20.5 6c-2.61.7-5.67 1-8.5 1s-5.89-.3-8.5-1L3 8c1.86.5 4 .83 6 1v13h2v-6h2v6h2V9c2-.17 4.14-.5 6-1l-.5-2zM12 6c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z" />
                    </svg>
                    <span class="nav-item-label">Business Opportunities</span>
                </a>
                <a href="profile.html" class="nav-item" data-tooltip="Startup Profile">
                    <svg class="nav-icon" viewBox="0 0 24 24">
                        <path d="M20 6h-4V4c0-1.11-.89-2-2-2h-4c-1.11 0-2 .89-2 2v2H4c-1.11 0-1.99.89-1.99 2L2 19c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2zm-6 0h-4V4h4v2z" />
                    </svg>
                    <span class="nav-item-label">Startup Profile</span>
                </a>
                <div class="sidebar-divider"></div>
                <a href="settings.html" class="nav-item" data-tooltip="Settings">
                    <svg class="nav-icon" viewBox="0 0 24 24">
                        <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.488.488 0 0 0-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 0 0-.48-.41h-3.84a.484.484 0 0 0-.48.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.488.488 0 0 0-.59.22L2.09 8.83a.488.488 0 0 0 .12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.48-.41l.36-2.54c.59-.24 1.13-.57 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z" />
                    </svg>
                    <span class="nav-item-label">Settings</span>
                </a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="topbar">
                <div style="display: flex; align-items: center; gap: 0.75rem;">
                    <button class="btn btn-outline" id="menu-toggle" style="margin-right: 1rem; padding: 4px 8px; display: none;">Menu</button>
                    <h1 class="topbar-title">Draft Generator</h1>
                </div>
                <div style="display: flex; align-items: center; gap: 1rem;">
                    <div style="font-size: 0.875rem; text-align: right;">
                        <div style="font-weight: 600;" id="header_user_name">...</div>
                        <div style="font-size: 0.75rem; color: var(--color-text-secondary);" id="header_user_meta">...</div>
                    </div>
                    <img src="https://ui-avatars.com/api/?name=User&background=0ea5e9&color=fff&size=32"
                        alt="User Profile" style="width: 32px; height: 32px; border-radius: 50%; object-fit: cover;"
                        id="header_user_avatar">
                </div>
            </header>

            <div class="container" style="padding-top: var(--spacing-lg); padding-bottom: 4rem;">
                <div class="draft-container">
                    <div class="draft-header">
                        <h2 class="draft-title" id="page-title">Application Draft Generator</h2>
                        <p class="draft-subtitle" id="page-subtitle">Loading the current opportunity schema.</p>
                    </div>

                    <div id="form-container"></div>

                    <div class="draft-actions">
                        <button class="btn" id="aiGenerateBtn" onclick="generateDraft()"
                            style="background: linear-gradient(135deg, #a855f7, #ec4899); color: white; border: none; font-weight: 600;">Generate Draft</button>
                        <button class="btn btn-outline" id="stageAssistBtn" onclick="stageBrowserAssist()">Stage Browser Assist</button>
                        <div style="flex-grow: 1;"></div>
                        <button class="btn btn-outline" onclick="copyAll()">Copy All</button>
                        <button class="btn btn-outline" onclick="downloadDraft()">Download Draft</button>
                        <button class="btn btn-primary" onclick="saveDraft()" id="saveBtn">Save Draft</button>
                        <button class="btn btn-primary" onclick="goToPreview()"
                            style="background: var(--color-success); border-color: var(--color-success);">Review Draft</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/api.js"></script>
    <script src="js/header.js"></script>
    <script src="js/app.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const opportunityId = params.get('opportunity_id');
        let currentOpportunity = null;
        let currentDraft = null;
        let currentSchema = null;

        function findField(fieldId) {
            return currentSchema.sections.flatMap(section => section.fields).find(field => field.id === fieldId);
        }

        function getFieldValue(field) {
            const el = document.getElementById(field.id);
            if (!el) return '';
            if (field.type === 'checkbox') return Boolean(el.checked);
            return el.value || '';
        }

        function setFieldValue(field, value) {
            const el = document.getElementById(field.id);
            if (!el) return;
            if (field.type === 'checkbox') {
                el.checked = value === true || value === 'true';
                return;
            }
            el.value = value === undefined || value === null ? '' : value;
        }

        function renderBanner() {
            const container = document.getElementById('form-container');
            const banner = document.createElement('div');
            const isExtensionSchema = currentDraft.schema_source === 'extension_capture';
            banner.className = 'draft-banner';
            banner.innerHTML = `
                <div class="draft-banner-title">${isExtensionSchema ? 'Live portal schema' : 'AI inferred schema'}</div>
                <div class="draft-banner-grid">
                    <div class="draft-banner-copy">
                        ${isExtensionSchema
                            ? 'These fields were captured from the external application portal. Review the answers here, then use the Chrome extension to fill the live site after login.'
                            : 'This structure was inferred from the opportunity. Use Stage Browser Assist and the FundMe extension on the external portal to capture the exact live fields before final submission.'}
                    </div>
                    <div class="draft-banner-meta">
                        <div><strong>Progress:</strong> ${currentDraft.completion?.progress || 0}%</div>
                        <div><strong>Source:</strong> ${currentDraft.source_url || currentOpportunity?.link || 'Not linked yet'}</div>
                        <div><strong>Schema:</strong> ${currentDraft.schema_source || 'manual'}</div>
                    </div>
                </div>
            `;
            container.appendChild(banner);
        }

        function renderFields() {
            document.getElementById('page-title').textContent = currentDraft.title || currentOpportunity.title || 'Application Draft';
            document.getElementById('page-subtitle').textContent = currentDraft.subtitle || 'Review and edit the AI-prepared answers before applying.';

            const container = document.getElementById('form-container');
            container.innerHTML = '';
            renderBanner();

            currentSchema.sections.forEach(section => {
                const sectionEl = document.createElement('section');
                sectionEl.style.marginBottom = '2rem';

                if (currentSchema.sections.length > 1) {
                    const heading = document.createElement('h3');
                    heading.style.cssText = 'margin-bottom:1rem;color:var(--color-primary-dark);font-size:1.1rem;border-bottom:1px solid #eee;padding-bottom:0.5rem;';
                    heading.textContent = section.title;
                    sectionEl.appendChild(heading);
                }

                section.fields.forEach(field => {
                    const group = document.createElement('div');
                    group.className = 'form-group';

                    const label = document.createElement('label');
                    label.className = 'form-label';
                    label.htmlFor = field.id;
                    label.innerHTML = `${field.label}${field.required ? ' <span style="color:var(--color-alert)">*</span>' : ''}`;
                    group.appendChild(label);

                    let input;
                    if (field.type === 'textarea') {
                        input = document.createElement('textarea');
                        input.className = 'form-textarea';
                    } else if (field.type === 'select') {
                        input = document.createElement('select');
                        input.className = 'form-select';

                        const blank = document.createElement('option');
                        blank.value = '';
                        blank.textContent = 'Select an option';
                        input.appendChild(blank);

                        (field.options || []).forEach(optionValue => {
                            const option = document.createElement('option');
                            option.value = optionValue;
                            option.textContent = optionValue;
                            input.appendChild(option);
                        });
                    } else if (field.type === 'checkbox') {
                        const row = document.createElement('div');
                        row.className = 'checkbox-row';
                        input = document.createElement('input');
                        input.type = 'checkbox';
                        input.id = field.id;
                        const note = document.createElement('span');
                        note.textContent = 'Mark this if your answer should be yes.';
                        row.appendChild(input);
                        row.appendChild(note);
                        group.appendChild(row);
                    } else {
                        input = document.createElement('input');
                        input.type = field.type === 'file' ? 'text' : (field.type || 'text');
                        input.className = 'form-input';
                        if (field.type === 'file') {
                            input.placeholder = 'Upload manually on the external portal';
                            input.disabled = true;
                        }
                    }

                    if (input && field.type !== 'checkbox') {
                        input.id = field.id;
                        if (field.placeholder && field.type !== 'file') input.placeholder = field.placeholder;
                        group.appendChild(input);
                    }

                    if (field.help_text || field.max_words) {
                        const helper = document.createElement('div');
                        helper.className = 'field-helper';
                        helper.textContent = [field.help_text, field.max_words ? `Target: ${field.max_words} words max.` : ''].filter(Boolean).join(' ');
                        group.appendChild(helper);
                    }

                    sectionEl.appendChild(group);
                    setFieldValue(field, currentDraft.form_fields?.[field.id]);
                });

                container.appendChild(sectionEl);
            });
        }

        async function ensureDraft() {
            if (!opportunityId) throw new Error('Missing opportunity_id in the page URL.');
            currentOpportunity = await api.getOpportunity(opportunityId);

            try {
                currentDraft = await api.getDraftByOpportunity(opportunityId);
            } catch (err) {
                if (!String(err.message || '').includes('Draft not found')) throw err;
            }

            if (!currentDraft) {
                let schema = currentOpportunity.generated_application_schema || null;

                if (!schema) {
                    try {
                        const schemaRes = await api.generateApplicationSchema(opportunityId, currentOpportunity.link || '');
                        schema = schemaRes.result;
                    } catch (err) {
                        console.warn('Application schema generation fell back to the backend default.', err);
                    }
                }

                currentDraft = await api.bootstrapDraft({
                    opportunity_id: opportunityId,
                    source_url: currentOpportunity.link || '',
                    form_schema: schema,
                    schema_source: schema ? 'ai_inferred' : 'manual'
                });
            }

            currentSchema = currentDraft.form_schema;
        }

        async function init() {
            try {
                await ensureDraft();
                renderFields();
            } catch (err) {
                console.error(err);
                document.getElementById('form-container').innerHTML = `
                    <div class="draft-banner" style="border-color:#fecaca;background:#fef2f2;">
                        <div class="draft-banner-title" style="color:#b91c1c;">Draft setup failed</div>
                        <div class="draft-banner-copy">${err.message || 'Please return to the opportunity page and try again.'}</div>
                    </div>
                `;
            }
        }

        async function saveDraft() {
            if (!currentDraft || !currentSchema) return;

            const payload = {};
            currentSchema.sections.forEach(section => {
                section.fields.forEach(field => {
                    payload[field.id] = getFieldValue(field);
                });
            });

            currentDraft = await api.updateDraft(currentDraft.draft_id, {
                form_fields: payload,
                source_url: currentOpportunity?.link || currentDraft.source_url || ''
            });

            const saveBtn = document.getElementById('saveBtn');
            const originalText = saveBtn.innerText;
            saveBtn.innerText = 'Saved!';
            saveBtn.style.background = '#059669';
            setTimeout(() => {
                saveBtn.innerText = originalText;
                saveBtn.style.background = '';
            }, 1600);
        }

        async function goToPreview() {
            await saveDraft();
            window.location.href = `draft-preview.html?draft_id=${currentDraft.draft_id}&opportunity_id=${opportunityId}`;
        }

        async function generateDraft() {
            const btn = document.getElementById('aiGenerateBtn');
            const originalText = btn.innerText;
            btn.innerText = 'Generating...';
            btn.disabled = true;

            try {
                const profile = await api.getProfile();
                const response = await api.generateDraftAnswers({
                    profile,
                    form_schema: currentSchema,
                    opportunity: currentOpportunity
                });

                Object.entries(response.result || {}).forEach(([fieldId, value]) => {
                    const field = findField(fieldId);
                    if (field) setFieldValue(field, value);
                });

                await saveDraft();
                btn.innerText = 'Generated';
            } catch (err) {
                console.error(err);
                alert(`Failed to generate answers: ${err.message || 'Unknown error'}. Please confirm your profile is complete and AI keys are configured.`);
                btn.innerText = originalText;
            } finally {
                btn.disabled = false;
                setTimeout(() => {
                    if (!btn.disabled && btn.innerText === 'Generated') btn.innerText = originalText;
                }, 2200);
            }
        }

        async function stageBrowserAssist() {
            if (!currentOpportunity?.link) {
                alert('This opportunity does not have an external application link yet.');
                return;
            }

            try {
                await saveDraft();
                await api.stageExtensionSession(opportunityId, currentOpportunity.link);
                window.open(currentOpportunity.link, '_blank', 'noopener');
                alert('Browser assist is staged. Open the FundMe Chrome extension on the external portal to capture or fill the live form.');
            } catch (err) {
                console.error(err);
                alert('Failed to stage browser assist for this opportunity.');
            }
        }

        function copyAll() {
            if (!currentSchema) return;
            let text = `${currentDraft.title || 'Application Draft'}\n\n`;
            currentSchema.sections.forEach(section => {
                text += `--- ${section.title} ---\n`;
                section.fields.forEach(field => {
                    text += `${field.label}\n${getFieldValue(field)}\n\n`;
                });
            });

            navigator.clipboard.writeText(text).then(() => {
                alert('Draft copied to clipboard.');
            });
        }

        function downloadDraft() {
            if (!currentSchema) return;
            let text = `${currentDraft.title || 'Application Draft'}\n\n`;
            currentSchema.sections.forEach(section => {
                text += `--- ${section.title} ---\n`;
                section.fields.forEach(field => {
                    text += `${field.label}\n${getFieldValue(field)}\n\n`;
                });
            });

            const blob = new Blob([text], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `draft_${opportunityId || 'application'}.txt`;
            a.click();
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>

</html>
