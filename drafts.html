<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FundMe | Drafts</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .drafts-hero {
            background: linear-gradient(180deg, #ffffff 0%, #f3f4f6 100%);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            padding: 1.5rem;
            margin-bottom: var(--spacing-xl);
        }

        .drafts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1.5rem;
        }

        .draft-card {
            background: var(--color-bg-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.08), 0 2px 4px -1px rgba(0, 0, 0, 0.05);
        }

        .draft-card-head {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .draft-provider {
            font-size: 0.8rem;
            color: var(--color-text-secondary);
            margin-top: 0.25rem;
        }

        .draft-progress-track {
            width: 100%;
            height: 10px;
            border-radius: 999px;
            background: #e5e7eb;
            overflow: hidden;
            margin-top: 0.5rem;
        }

        .draft-progress-fill {
            height: 100%;
            background: var(--color-accent);
        }

        .missing-chip-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.75rem;
        }

        .missing-chip {
            display: inline-flex;
            align-items: center;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 700;
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
        }

        .draft-card-actions {
            display: flex;
            gap: 0.75rem;
            margin-top: 1.25rem;
            flex-wrap: wrap;
        }

        .draft-card-actions .btn {
            flex: 1;
            justify-content: center;
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1.5rem;
            background: var(--color-bg-surface);
            border: 1px dashed var(--color-border);
            border-radius: var(--radius-lg);
            color: var(--color-text-secondary);
        }
    </style>
</head>

<body>
    <div class="dashboard-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <span class="sidebar-logo">FundMe.</span>
                <button class="sidebar-toggle" id="sidebar-toggle">
                    <svg viewBox="0 0 24 24">
                        <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z" />
                    </svg>
                </button>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item" data-tooltip="Dashboard">
                    <svg class="nav-icon" viewBox="0 0 24 24">
                        <path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z" />
                    </svg>
                    <span class="nav-item-label">Dashboard</span>
                </a>
                <a href="explorer.html" class="nav-item" data-tooltip="Explorer">
                    <svg class="nav-icon" viewBox="0 0 24 24">
                        <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" />
                    </svg>
                    <span class="nav-item-label">Explorer</span>
                </a>
                <a href="saved.html" class="nav-item" data-tooltip="Saved">
                    <svg class="nav-icon" viewBox="0 0 24 24">
                        <path d="M17 3H7c-1.1 0-1.99.9-1.99 2L5 21l7-3 7 3V5c0-1.1-.9-2-2-2z" />
                    </svg>
                    <span class="nav-item-label">Saved</span>
                </a>
                <a href="drafts.html" class="nav-item active" data-tooltip="Drafts">
                    <svg class="nav-icon" viewBox="0 0 24 24">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm0 0v6h6" />
                    </svg>
                    <span class="nav-item-label">Drafts</span>
                </a>
                <a href="applications.html" class="nav-item" data-tooltip="Applications">
                    <svg class="nav-icon" viewBox="0 0 24 24">
                        <path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z" />
                    </svg>
                    <span class="nav-item-label">Applications</span>
                </a>
                <a href="business-opportunities.html" class="nav-item" data-tooltip="Business Opportunities">
                    <svg class="nav-icon" viewBox="0 0 24 24">
                        <path d="M20.5 6c-2.61.7-5.67 1-8.5 1s-5.89-.3-8.5-1L3 8c1.86.5 4 .83 6 1v13h2v-6h2v6h2V9c2-.17 4.14-.5 6-1l-.5-2zM12 6c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z" />
                    </svg>
                    <span class="nav-item-label">Business Opportunities</span>
                </a>
                <a href="profile.html" class="nav-item" data-tooltip="Startup Profile">
                    <svg class="nav-icon" viewBox="0 0 24 24">
                        <path d="M20 6h-4V4c0-1.11-.89-2-2-2h-4c-1.11 0-2 .89-2 2v2H4c-1.11 0-1.99.89-1.99 2L2 19c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2zm-6 0h-4V4h4v2z" />
                    </svg>
                    <span class="nav-item-label">Startup Profile</span>
                </a>
                <div class="sidebar-divider"></div>
                <a href="settings.html" class="nav-item" data-tooltip="Settings">
                    <svg class="nav-icon" viewBox="0 0 24 24">
                        <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.488.488 0 0 0-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 0 0-.48-.41h-3.84a.484.484 0 0 0-.48.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.488.488 0 0 0-.59.22L2.09 8.83a.488.488 0 0 0 .12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.48-.41l.36-2.54c.59-.24 1.13-.57 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z" />
                    </svg>
                    <span class="nav-item-label">Settings</span>
                </a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="topbar">
                <button class="btn btn-outline" id="menu-toggle" style="margin-right: 1rem; padding: 4px 8px; display: none;">Menu</button>
                <div style="flex: 1; display: flex; align-items: center; gap: 0.75rem;">
                    <h1 class="topbar-title">Drafts</h1>
                </div>
                <div style="display: flex; align-items: center; gap: 1rem;">
                    <div style="font-size: 0.875rem; text-align: right;">
                        <div style="font-weight: 600;" id="header_user_name">...</div>
                        <div style="font-size: 0.75rem; color: var(--color-text-secondary);" id="header_user_meta">...</div>
                    </div>
                    <img src="https://ui-avatars.com/api/?name=User&background=0ea5e9&color=fff&size=32"
                        alt="User Profile" style="width: 32px; height: 32px; border-radius: 50%; object-fit: cover;"
                        id="header_user_avatar">
                </div>
            </header>

            <div class="container" style="padding-top: var(--spacing-lg); padding-bottom: 4rem;">
                <div class="drafts-hero">
                    <div style="display:flex;justify-content:space-between;gap:1rem;flex-wrap:wrap;align-items:flex-start;">
                        <div>
                            <h2 style="margin:0 0 0.3rem 0;font-size:1.5rem;">AI Draft Workspace</h2>
                            <div style="color:var(--color-text-secondary);font-size:1rem;">
                                Continue captured portal drafts, fill AI-inferred forms, and prepare for external submission.
                            </div>
                        </div>
                        <div style="text-align:right;">
                            <div class="badge badge-green" id="hero-count">0 drafts active</div>
                            <div style="margin-top:0.5rem;color:var(--color-text-secondary);" id="hero-progress">No drafts yet.</div>
                        </div>
                    </div>
                </div>

                <div id="drafts-grid" class="drafts-grid"></div>
            </div>
        </main>
    </div>

    <script src="js/api.js"></script>
    <script src="js/header.js"></script>
    <script src="js/app.js"></script>
    <script>
        function renderEmptyState(message) {
            document.getElementById('drafts-grid').innerHTML = `
                <div class="empty-state">
                    <h3 style="margin-bottom:0.5rem;color:var(--color-primary-dark);">No drafts yet</h3>
                    <p style="margin-bottom:1rem;">${message}</p>
                    <a class="btn btn-primary" href="explorer.html">Explore Opportunities</a>
                </div>
            `;
        }

        function renderDraftCard(draft) {
            const missing = draft.completion?.missing_fields || [];
            const progress = draft.completion?.progress || 0;
            const provider = draft.opportunity?.provider || 'Funding opportunity';
            const title = draft.title || draft.opportunity?.title || 'Application Draft';
            const schemaLabel = draft.schema_source === 'extension_capture' ? 'Live portal' : 'AI inferred';

            return `
                <article class="draft-card">
                    <div class="draft-card-head">
                        <div>
                            <h3 class="opp-title" style="margin:0;">${title}</h3>
                            <div class="draft-provider">${provider}</div>
                        </div>
                        <span class="badge badge-blue">${schemaLabel}</span>
                    </div>

                    <div style="display:flex;justify-content:space-between;gap:1rem;font-size:0.85rem;color:var(--color-text-secondary);">
                        <span>Progress</span>
                        <strong style="color:var(--color-primary-dark);">${progress}%</strong>
                    </div>
                    <div class="draft-progress-track">
                        <div class="draft-progress-fill" style="width:${progress}%;"></div>
                    </div>

                    <div style="margin-top:1rem;font-size:0.875rem;color:var(--color-text-secondary);">
                        <div><strong>Portal:</strong> ${draft.source_url || draft.opportunity?.link || 'Not linked yet'}</div>
                        <div><strong>Last saved:</strong> ${draft.last_saved ? new Date(draft.last_saved).toLocaleString() : 'Not saved yet'}</div>
                    </div>

                    <div class="missing-chip-list">
                        ${missing.length
                            ? missing.slice(0, 5).map(fieldId => `<span class="missing-chip">${fieldId.replace(/_/g, ' ')}</span>`).join('')
                            : '<span class="badge badge-green">Ready for review</span>'}
                    </div>

                    <div class="draft-card-actions">
                        <a class="btn btn-primary" href="draft-generator.html?opportunity_id=${draft.opportunity_id}">Continue Draft</a>
                        <a class="btn btn-outline" href="draft-preview.html?draft_id=${draft.draft_id}&opportunity_id=${draft.opportunity_id}">Review Draft</a>
                        <button class="btn btn-outline" style="background: var(--color-success); border-color: var(--color-success); color: white;" onclick="markDraftAsApplied('${draft.opportunity_id}')">Mark Applied</button>
                    </div>
                </article>
            `;
        }

        async function markDraftAsApplied(opportunityId) {
            try {
                if (!confirm('Mark this opportunity as applied?')) return;
                // Get the draft to potentially pass deadline if needed
                await api.createApplication(opportunityId, null);
                window.location.href = 'applications.html';
            } catch (err) {
                console.error(err);
                alert('Failed to mark as applied: ' + (err.message || err));
            }
        }

        async function initDraftsPage() {
            try {
                const drafts = await api.getDrafts();
                if (!drafts.length) {
                    renderEmptyState('Start from any opportunity, generate a draft, and it will appear here.');
                    return;
                }

                const average = Math.round(drafts.reduce((sum, draft) => sum + (draft.completion?.progress || 0), 0) / drafts.length);
                document.getElementById('hero-count').textContent = `${drafts.length} drafts active`;
                document.getElementById('hero-progress').textContent = `Average completion: ${average}%`;
                document.getElementById('drafts-grid').innerHTML = drafts.map(renderDraftCard).join('');
            } catch (err) {
                console.error(err);
                renderEmptyState('We could not load your drafts right now.');
            }
        }

        document.addEventListener('DOMContentLoaded', initDraftsPage);
    </script>
</body>

</html>
